services:
  web:
    image: nginx:1.29.7-alpine
    container_name: accreditation_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html/src
      - ./nginx.conf/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  app:
    user: "${DOCKER_UID}:${DOCKER_GID}"
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: accreditation_app
    restart: always
    env_file:
      - .env.prod
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
      - mongo

  db:
    image: mysql:8.4.8
    container_name: accreditation_mysql
    restart: always
    env_file:
      - .env.prod
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data_prod:/var/lib/mysql
    ports:
      - "3306:3306"

  mongo:
    image: mongo:7.0.30
    container_name: accreditation_mongo
    restart: always
    volumes:
      - mongo_data_prod:/data/db
    ports:
      - "27021:27017"

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel_prod
    restart: always
    env_file:
      - .env.prod
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    depends_on:
      - web

volumes:
  db_data_prod:
  mongo_data_prod: